    <!-- Main -->

    <div id="main">

        <section class="post">

            <header class="major">

                <span class="date">
                    Login
                </span>

                <h1>
                    Belépés
                </h1>

                <p>
                    Jelentkezz be a Vaszilij EDC közösségi felületére.
                </p>

            </header>

            <!-- BELÉPÉS FORM -->

            <form method="post"
                  action="#">

                <div class="fields">

                    <div class="field">

                        <label for="email">
                            Email cím
                        </label>

                        <input type="email"
                               name="email"
                               id="email"
                               placeholder="pelda@email.hu" />

                    </div>

                    <div class="field">

                        <label for="password">
                            Jelszó
                        </label>

                        <input type="password"
                               name="password"
                               id="password"
                               placeholder="Jelszó" />

                    </div>

                    <div class="field">

                        <input type="checkbox"
                               id="remember"
                               name="remember">

                        <label for="remember">

                            Emlékezz rám

                        </label>

                    </div>

                </div>

                <ul class="actions">

                    <li>

                        <input type="submit"
                               value="Belépés"
                               class="primary" />

                    </li>

                </ul>

            </form>

            <hr />

            <!-- REGISZTRÁCIÓ -->

            <header>

                <h2>
                    Regisztráció
                </h2>

                <p>
                    Hozz létre saját fiókot a közösségi funkciókhoz.
                </p>

            </header>

            <form method="post"
                  action="#">

                <div class="fields">

                    <div class="field">

                        <label for="username">
                            Felhasználónév
                        </label>

                        <input type="text"
                               name="username"
                               id="username"
                               placeholder="Felhasználónév" />

                    </div>

                    <div class="field">

                        <label for="register-email">
                            Email cím
                        </label>

                        <input type="email"
                               name="register-email"
                               id="register-email"
                               placeholder="pelda@email.hu" />

                    </div>

                    <div class="field">

                        <label for="register-password">
                            Jelszó
                        </label>

                        <input type="password"
                               name="register-password"
                               id="register-password"
                               placeholder="Jelszó" />

                    </div>

                    <div class="field">

                        <label for="register-password-repeat">
                            Jelszó újra
                        </label>

                        <input type="password"
                               name="register-password-repeat"
                               id="register-password-repeat"
                               placeholder="Jelszó újra" />

                    </div>

                    <div class="field">

                        <input type="checkbox"
                               id="terms"
                               name="terms">

                        <label for="terms">

                            Elfogadom az adatkezelési feltételeket

                        </label>

                    </div>

                </div>

                <ul class="actions">

                    <li>

                        <input type="submit"
                               value="Regisztráció"
                               class="primary" />

                    </li>

                </ul>

            </form>
